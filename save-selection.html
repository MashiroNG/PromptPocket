<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>保存提示词</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #131313;
      --panel: #202020;
      --surface: #2e2e2e;
      --surface-hover: #414141;
      --border: rgba(248, 248, 248, 0.12);
      --text: #f8f8f8;
      --secondary: #c7c7c7;
      --muted: #989898;
      --accent: #f8f8f8;
      --accent-text: #020202;
      --danger: #f0b3b3;
      --page-bg:
        radial-gradient(circle at 18% -12%, rgba(248, 248, 248, 0.08), transparent 34%),
        linear-gradient(180deg, #202020, #020202);
      --card-bg:
        linear-gradient(180deg, rgba(248, 248, 248, 0.04), rgba(248, 248, 248, 0.012)),
        var(--panel);
      --card-shadow: 0 14px 32px rgba(0, 0, 0, 0.28), inset 0 1px 0 rgba(248, 248, 248, 0.04);
      --field-bg: rgba(0, 0, 0, 0.18);
      --option-bg: rgba(0, 0, 0, 0.14);
      --focus-border: rgba(248, 248, 248, 0.38);
      --focus-ring: rgba(152, 152, 152, 0.45);
      --toggle-bg: #414141;
      --toggle-dot: #c7c7c7;
      --toggle-checked-bg: #6b6b6b;
      --toggle-checked-dot: #f8f8f8;
      --button-bg: linear-gradient(180deg, #414141, var(--surface));
      --button-hover-bg: linear-gradient(180deg, #565656, var(--surface-hover));
    }
    body.theme-light {
      color-scheme: light;
      --bg: #f8f8f8;
      --panel: #ffffff;
      --surface: #f8f8f8;
      --surface-hover: #ffffff;
      --border: rgba(2, 2, 2, 0.1);
      --text: #020202;
      --secondary: #202020;
      --muted: #6b6b6b;
      --accent: #020202;
      --accent-text: #ffffff;
      --danger: #9b2020;
      --page-bg:
        radial-gradient(circle at 18% -12%, rgba(2, 2, 2, 0.05), transparent 34%),
        linear-gradient(180deg, #ffffff, #f8f8f8);
      --card-bg: #ffffff;
      --card-shadow: 0 12px 30px rgba(0, 0, 0, 0.08), inset 0 1px 0 rgba(255, 255, 255, 0.85);
      --field-bg: #f8f8f8;
      --option-bg: #f8f8f8;
      --focus-border: rgba(2, 2, 2, 0.32);
      --focus-ring: rgba(65, 65, 65, 0.2);
      --toggle-bg: #c7c7c7;
      --toggle-dot: #ffffff;
      --toggle-checked-bg: #020202;
      --toggle-checked-dot: #ffffff;
      --button-bg: linear-gradient(180deg, #ffffff, #f8f8f8);
      --button-hover-bg: linear-gradient(180deg, #ffffff, #e7e7e7);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      padding: 16px;
      background: var(--page-bg);
      color: var(--text);
      font: 14px/1.5 "Microsoft YaHei UI", "Microsoft YaHei", "PingFang SC", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .shell {
      min-height: calc(100vh - 32px);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
      font-weight: 800;
    }
    .subtle {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 13px;
      box-shadow: var(--card-shadow);
    }
    .field {
      display: grid;
      gap: 6px;
      margin-bottom: 12px;
    }
    label {
      color: var(--secondary);
      font-size: 12px;
      font-weight: 700;
    }
    input, textarea, select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 11px;
      background: var(--field-bg);
      color: var(--text);
      font: inherit;
      outline: none;
    }
    select {
      cursor: pointer;
    }
    textarea {
      min-height: 170px;
      resize: vertical;
    }
    input:focus-visible, textarea:focus-visible, select:focus-visible {
      border-color: var(--focus-border);
      outline: 2px solid var(--focus-ring);
      outline-offset: 1px;
    }
    .options {
      display: grid;
      gap: 8px;
    }
    .folder-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }
    .folder-row button {
      min-width: 86px;
      white-space: nowrap;
    }
    .new-folder-row {
      display: none;
      grid-template-columns: 1fr auto auto;
      gap: 8px;
      margin-top: 8px;
    }
    .new-folder-row.open {
      display: grid;
    }
    .new-folder-row input {
      min-width: 0;
    }
    .new-folder-row button {
      padding: 0 12px;
      white-space: nowrap;
    }
    .option-row {
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: center;
      gap: 10px;
      padding: 10px 11px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--option-bg);
      cursor: pointer;
    }
    .option-row input {
      appearance: none;
      width: 34px;
      height: 20px;
      margin: 0;
      border-radius: 999px;
      background: var(--toggle-bg);
      position: relative;
      padding: 0;
    }
    .option-row input::after {
      content: "";
      position: absolute;
      top: 2px;
      left: 2px;
      width: 14px;
      height: 14px;
      border-radius: 999px;
      background: var(--toggle-dot);
      transition: transform 160ms ease, background 160ms ease;
    }
    .option-row input:checked {
      background: var(--toggle-checked-bg);
    }
    .option-row input:checked::after {
      transform: translateX(14px);
      background: var(--toggle-checked-dot);
    }
    .option-title {
      display: block;
      font-size: 13px;
      font-weight: 800;
    }
    .option-desc {
      display: block;
      margin-top: 1px;
      color: var(--muted);
      font-size: 12px;
    }
    .error {
      display: none;
      color: var(--danger);
      font-size: 12px;
    }
    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: auto;
    }
    button {
      min-height: 34px;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0 14px;
      background: var(--button-bg);
      color: var(--text);
      cursor: pointer;
      font: inherit;
      font-weight: 750;
    }
    button:hover {
      background: var(--button-hover-bg);
    }
    button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: var(--accent-text);
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="header">
      <div>
        <h1>保存提示词</h1>
        <div class="subtle">确认标题、内容和归类后再保存</div>
      </div>
    </header>

    <section class="card">
      <div class="field">
        <label for="promptTitle">标题</label>
        <input id="promptTitle" type="text" placeholder="给这条提示词起个名字" />
      </div>

      <div class="field">
        <label for="folderSelect">保存到</label>
        <div class="folder-row">
          <select id="folderSelect"></select>
          <button type="button" id="newFolderBtn">+ 新建</button>
        </div>
        <div class="new-folder-row" id="newFolderRow">
          <input id="newFolderName" type="text" placeholder="新文件夹名称" />
          <button type="button" id="confirmFolderBtn">添加</button>
          <button type="button" id="cancelFolderBtn">取消</button>
        </div>
      </div>

      <div class="field">
        <label for="promptText">提示词内容</label>
        <textarea id="promptText" placeholder="这里是刚选中的内容，可以保存前修改"></textarea>
      </div>

      <div class="options">
        <label class="option-row">
          <input id="promptPinned" type="checkbox" />
          <span>
            <span class="option-title">置顶到一级菜单</span>
            <span class="option-desc">适合高频提示词，可在右键菜单直接使用</span>
          </span>
        </label>
      </div>
    </section>

    <div id="errorText" class="error"></div>

    <div class="actions">
      <button type="button" id="cancelBtn">取消</button>
      <button type="button" class="primary" id="saveBtn">保存</button>
    </div>
  </main>

  <script src="save-selection.js"></script>
</body>
</html>
